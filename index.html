  async enablePush(){
    try{
      if(!('Notification' in window) || !('PushManager' in window)){
        toast('Push isn’t supported in this browser. On iPhone, install the app to your Home Screen first.', true); return;
      }
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ this.renderShell(); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({userVisibleOnly:true,
        applicationServerKey: (b64=>{const pad='='.repeat((4-b64.length%4)%4); const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
          return Uint8Array.from(raw, c=>c.charCodeAt(0));})(VAPID_PUBLIC)});
      let did = localStorage.getItem('lodge_device_id');
      if(!did){ did = uid(); localStorage.setItem('lodge_device_id', did); }
      store.push = store.push||[];
      const rec = {id:did, name:session.name, sub:sub.toJSON(), updatedAt:now()};
      const existing = store.push.find(x=>x.id===did);
      if(existing) Object.assign(existing, rec); else store.push.push(rec);
      save(); this.renderShell(); toast('Notifications enabled on this device.'); doSync(true);
    }catch(e){ toast('Could not enable notifications: '+e.message, true); }
  },
  permAdd(){
    const v=$('#pm_member').value; if(!v) return;
    if(!isOwner()){ toast('Only the Secretary can change permissions.', true); return; }
    store.perms.managers=(store.perms.managers||[]); store.perms.managers.push(v); store.perms.updatedAt=now();
    save(); this.renderShell(); toast('Permission granted.'); doSync(true);
  },
  permDel(mid){
    if(!isOwner()){ toast('Only the Secretary can change permissions.', true); return; }
    store.perms.managers=(store.perms.managers||[]).filter(x=>x!==mid); store.perms.updatedAt=now();
    save(); this.renderShell(); toast('Permission removed.'); doSync(true);
  },
  saveAlbum(){ store.photos={albumUrl:$('#st_album').value.trim(), updatedAt:now()}; save(); toast('Album link saved.'); doSync(true); },
  verifyEmail(){
    const v = (($('#me_email')||{}).value||'').trim().toLowerCase();
    if(!v){ toast('Type your email address first.', true); return; }
    const m = store.members.find(x=>!x.deleted && (x.email||'').trim().toLowerCase()===v);
    if(!m){ toast('That address isn’t on the members list. Check it, or ask the Secretary to add it to your record.', true); return; }
    session.memberId = m.id;
    session.name = m.name;          // attribute future tasks and messages to the name in the list
    session.verified = true; session.picking = false;
    setSession(session);
    this.renderShell();
    toast('Thank you — you are recognised as ' + m.name + '.');
    doSync(true);
  },
  /* only ever reaches records the lodge holds no email for — carries no office */
  linkMe(memberId){
    const id = memberId || ($('#me_pick') && $('#me_pick').value);
    const m = id && memberById(id);
    if(!m){ toast('Choose your name from the list first.', true); return; }
    if((m.email||'').trim()){ toast('The lodge holds an email address for that brother — confirm it above instead.', true); return; }
    session.memberId = m.id;
    session.name = m.name;
    session.verified = false; session.picking = false;
    setSession(session);
    this.renderShell();
    toast('Thank you — the app now knows you are ' + m.name + '.');
    doSync(true);
  },
  unlinkMe(){
    session.memberId = null; session.picking = true; setSession(session);
    this.renderShell(); toast('Pick the right name from the list.');
  },
  switchUser(){ session=null; localStorage.removeItem(KEY_SESS); location.reload(); },
  exportData(){
    const blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='lodge-crm-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href);
  },
  async importData(){
    const f=$('#st_import').files[0]; if(!f){ toast('Choose a backup file first.', true); return; }
    try{
      const d=JSON.parse(await f.text());
      if(!d.members||!d.meetings) throw new Error('bad');
      if(!confirm('Replace the data on this device with this backup?')) return;
      store={...freshStore(), ...d}; save(); this.go('members'); toast('Backup restored.');
    }catch(e){ toast('That file is not a valid backup.', true); }
  },

  /* ---------- todos (shared) ---------- */
  todoAdd(ctx){
    const byId=id=>document.getElementById(id);
    const name=byId('td_name_'+ctx).value.trim(), task=byId('td_task_'+ctx).value.trim(), due=byId('td_due_'+ctx).value;
    if(!task){ toast('Type the task first.', true); return; }
    todosFor(ctx).push({id:uid(), name:name||session.name, task, due, done:false, by:session.name, createdAt:now(), updatedAt:now()});
    this.touchCtx(ctx); save(); this.renderShell();
  },
  todoTick(ctx,id){ const t=todosFor(ctx).find(x=>x.id===id); t.done=true; t.doneAt=now(); t.updatedAt=now(); save(); this.renderShell(); },
  todoUntick(ctx,id){ const t=todosFor(ctx).find(x=>x.id===id); t.done=false; t.updatedAt=now(); save(); this.renderShell(); },
  todoDel(ctx,id){ const t=todosFor(ctx).find(x=>x.id===id); t.deleted=true; t.updatedAt=now(); save(); this.renderShell(); },
  toggleDone(ctx){ this.showDone[ctx]=!this.showDone[ctx]; this.renderShell(); },
  touchCtx(ctx){ /* todos carry their own updatedAt; nothing else needed */ },
};

/* =====================================================================
   LOGIN + MEMBER FORM MODE
   ===================================================================== */
function renderLogin(step, err){
  const names = sortedMembers();
  $('#app').innerHTML = `
    <div id="login"><div class="box">
      <img src="./logo.jpg" alt="Composite Lodge crest">
      <h1>Composite Lodge No. 4076</h1>
      <div class="sub">${
        step==='pass'  ? 'Enter the lodge passcode' :
        step==='guest' ? 'Choose your name. You will be able to read the app and mark your own attendance, but no office or permissions come with it.' :
                         'Confirm who you are — your email address is matched against the members list.'}</div>
      ${step==='pass' ? `
        <input type="password" id="lg_pass" placeholder="Lodge passcode" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')tryPass()">
        <div class="err">${esc(err||'')}</div>
        <button class="btn" style="width:100%;" onclick="tryPass()">Enter</button>
      ` : step==='guest' ? `
        ${(()=>{ const noEmail = names.filter(m=>!(m.email||'').trim());
          return noEmail.length? `
            <div class="namelist">
              ${noEmail.map(m=>`<button onclick="pickName('${jsq(m.name)}','${m.id}')">${esc(m.name)}</button>`).join('')}
            </div>
            <div class="small muted" style="margin-top:10px;text-align:left;">Only brethren whose email address the lodge does not hold are listed. Ask the Secretary to add yours so the app can recognise you properly.</div>`
          : `<div class="small muted" style="padding:12px;">Every member on the list has an email address recorded, so please sign in with yours. If the lodge has the wrong address for you, ask the Secretary.</div>`;
        })()}
        <div class="err">${esc(err||'')}</div>
        <button class="btn ghost" style="width:100%;margin-top:10px;" onclick="renderLogin('who')">← Back</button>
      ` : `
        ${names.length? `
          <input id="lg_email" type="email" autocomplete="email" placeholder="The email address you gave the lodge"
            onkeydown="if(event.key==='Enter')signInByEmail()">
          <div class="err">${esc(err||'')}</div>
          <button class="btn" style="width:100%;" onclick="signInByEmail()">Continue</button>
          <button class="btn ghost" style="width:100%;margin-top:8px;" onclick="renderLogin('guest')">The lodge doesn’t have my email address</button>
        ` : `
          <div class="small muted" style="padding:4px 0 10px;">No members in the list yet — type your name to get started.</div>
          <input id="lg_name" placeholder="Your name" onkeydown="if(event.key==='Enter')pickName()">
          <div class="err">${esc(err||'')}</div>
          <button class="btn" style="width:100%;" onclick="pickName()">Continue</button>
        `}
      `}
    </div></div>`;
  if(step==='pass') $('#lg_pass').focus();
}
let pendingToken = null;
async function tryPass(){
  const v = $('#lg_pass').value;
  if(await sha256(v) !== PASS_HASH){ renderLogin('pass','That passcode isn’t right — check with the Secretary.'); return; }
  pendingToken = await decryptToken(v);
  if(new URLSearchParams(location.search).has('form')) renderMemberForm();
  else renderLogin('who');
}
/* the ordinary way in: prove the address held against your record */
function signInByEmail(){
  const v = ($('#lg_email').value||'').trim().toLowerCase();
  if(!v){ renderLogin('who','Please enter your email address.'); return; }
  const m = store.members.find(x=>!x.deleted && (x.email||'').trim().toLowerCase()===v);
  if(!m){ renderLogin('who','That address isn’t on the members list. Check it, or ask the Secretary to add it to your record.'); return; }
  session = {name:m.name, memberId:m.id, verified:true, token:pendingToken, until: now()+30*864e5};
  setSession(session);
  App.renderShell();
  doSync(true);
}
/* fallback for brethren the lodge holds no address for — carries no office */
function pickName(n, memberId){
  const name = n || $('#lg_name').value.trim();
  if(!name){ return; }
  if(memberId){
    const m = memberById(memberId);
    if(m && (m.email||'').trim()){ renderLogin('guest','Please sign in with that brother’s email address instead.'); return; }
  }
  session = {name, memberId:memberId||null, verified:false, token:pendingToken, until: now()+30*864e5};
  setSession(session);
  App.renderShell();
  doSync(true);
}

/* ---- member details form (?form) ---- */
function renderMemberForm(done){
  $('#app').innerHTML = `
    <div id="login"><div class="box" style="text-align:left;">
      <div style="text-align:center;">
        <img src="./logo.jpg" alt="">
        <h1 style="font-size:19px;">Composite Lodge No. 4076</h1>
        <div class="sub">Member details — takes under a minute</div>
      </div>
      ${done? `<p style="text-align:center;">✅ <b>Thank you, Brother.</b><br><span class="small muted">Your details have been received and will appear in the lodge members list.</span></p>`
      : `
      <div class="field"><label>Full name</label><input id="fm_name"></div>
      <div class="field"><label>Contact number</label><input id="fm_phone" type="tel"></div>
      <div class="field"><label>Email address</label><input id="fm_email" type="email"></div>
      <div class="field"><label>Rank</label><select id="fm_rank"><option value="">Choose…</option>${RANKS.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Office (if any)</label><select id="fm_office"><option value="">None</option>${OFFICES.map(o=>`<option>${o}</option>`).join('')}</select></div>
      <div class="err" id="fm_err" style="color:var(--danger);font-size:13px;min-height:18px;"></div>
      <button class="btn" style="width:100%;" onclick="submitMemberForm()">Submit</button>`}
    </div></div>`;
}
async function submitMemberForm(){
  const name=$('#fm_name').value.trim(), phone=$('#fm_phone').value.trim(),
        email=$('#fm_email').value.trim(), rank=$('#fm_rank').value, office=$('#fm_office').value;
  if(!name){ $('#fm_err').textContent='Please enter your name.'; return; }
  if(!pendingToken){ $('#fm_err').textContent='The form isn’t connected yet — please reply to the Secretary with your details instead.'; return; }
  try{
    const payload={name, phone, email, rank, office, at:now()};
    const tmp = session; session={token:pendingToken};
    await ghPut('submissions/'+uid()+'.json', b64encode(JSON.stringify(payload)), 'Member form: '+name);
    session = tmp;
    renderMemberForm(true);
  }catch(e){ $('#fm_err').textContent='Could not send just now — please check your connection and try again.'; }
}

/* =====================================================================
   BOOT
   ===================================================================== */
(async function boot(){
  await loadSyncCfg();
  if(new URLSearchParams(location.search).has('form')){ renderLogin('pass'); return; }
  if(session){ App.renderShell(); doSync(true); }   // auto-sync on opening
  else renderLogin('pass');
})();

/* ---- keep in sync automatically ---- */
let lastAutoSync = 0;
function autoSync(){
  if(!session || !session.token || syncing) return;
  if(now() - lastAutoSync < 60000) return;   // at most once a minute
  lastAutoSync = now();
  doSync(true);
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') autoSync(); });
document.addEventListener('click', e=>{
  const box=$('#mentionbox');
  if(box && !box.hidden && !e.target.closest('#mentionbox')) box.hidden=true;
});
window.addEventListener('online', autoSync);
setInterval(()=>{ if(document.visibilityState==='visible') autoSync(); }, 3*60*1000);  // every 3 min while open

if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
