<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Composite Lodge No. 4076</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<meta name="theme-color" content="#141B4D">
<style>
  :root{
    --navy-deep:#141B4D; --navy:#1E2A6E; --gold:#C9A227; --gold-bright:#E3B93E;
    --ink:#20244a; --muted:#5A6080; --ground:#F5F6FA; --surface:#FFFFFF;
    --line:#E3E6F2; --chip:#EEF0F8; --danger:#B03A2E; --ok:#2E7D32;
    --serif:'Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
    --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--ground); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.5; }
  button{ font-family:var(--sans); font-size:14px; cursor:pointer; border:none; border-radius:8px; }
  input,select,textarea{ font-family:var(--sans); font-size:14px; color:var(--ink); background:#fff;
    border:1px solid #C9CEE4; border-radius:8px; padding:9px 12px; width:100%; }
  input:focus,select:focus,textarea:focus,button:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:1px; }
  textarea{ min-height:84px; resize:vertical; }
  a{ color:var(--navy); }
  h1,h2,h3{ font-family:var(--serif); color:var(--navy-deep); margin:0 0 .4em; }

  /* ---------- App frame: header + left sidebar ---------- */
  #topbar{ position:fixed; top:0; left:0; right:0; height:56px; background:var(--navy-deep); color:#fff;
    display:flex; align-items:center; gap:12px; padding:0 14px; z-index:30; }
  #topbar .logo{ width:36px; height:36px; border-radius:50%; border:2px solid var(--gold); background:#fff; flex:none; }
  #topbar .name{ font-family:var(--serif); font-size:17px; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #topbar .grow{ flex:1; }
  #burger{ display:none; background:none; color:#fff; font-size:22px; padding:4px 8px; }
  .syncbtn{ background:var(--gold-bright); color:var(--navy-deep); font-weight:700; padding:8px 16px; border-radius:8px; flex:none; }
  .syncbtn:disabled{ opacity:.6; cursor:wait; }
  #userchip{ background:rgba(255,255,255,.14); border-radius:999px; padding:5px 12px; font-size:12px; white-space:nowrap; }
  #bell{ position:relative; background:none; color:#fff; font-size:19px; padding:4px 8px; flex:none; }
  #bell.on{ background:rgba(255,255,255,.14); border-radius:8px; }
  .nbadge{ position:absolute; top:-2px; right:-2px; background:#D93025; color:#fff; font-size:10px; font-weight:700;
    border-radius:999px; padding:1px 5px; min-width:16px; text-align:center; line-height:1.4; }
  #mentionbox{ position:fixed; z-index:60; background:var(--surface); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 8px 24px rgba(20,27,77,.18); width:220px; overflow:hidden; }
  #mentionbox button{ display:block; width:100%; text-align:left; background:none; padding:9px 14px;
    border-bottom:1px solid var(--chip); border-radius:0; font-size:13.5px; color:var(--navy); font-weight:600; }
  #mentionbox button:hover{ background:var(--chip); }

  #sidebar{ position:fixed; top:56px; left:0; bottom:0; width:210px; background:var(--navy); padding:14px 10px;
    display:flex; flex-direction:column; gap:2px; z-index:25; overflow-y:auto; }
  #sidebar button{ background:none; color:#B9C0EA; text-align:left; padding:11px 14px; border-radius:8px;
    font-size:14.5px; display:flex; gap:10px; align-items:center; width:100%; }
  #sidebar button.on{ background:rgba(255,255,255,.10); color:#fff; font-weight:600; box-shadow:inset 3px 0 0 var(--gold-bright); }
  #sidebar button:hover{ color:#fff; }
  #sidebar .spacer{ flex:1; }
  #sidebar .synced{ color:#8A93CC; font-size:11px; padding:8px 14px; }

  #main{ margin:56px 0 0 210px; padding:22px; max-width:980px; }

  @media (max-width:760px){
    #burger{ display:block; }
    #sidebar{ transform:translateX(-100%); transition:transform .2s; width:230px; box-shadow:4px 0 20px rgba(0,0,0,.25); }
    #sidebar.open{ transform:none; }
    #main{ margin-left:0; padding:14px; }
    #userchip{ display:none; }
    #topbar .name{ font-size:15px; }
  }
  @media (prefers-reduced-motion: reduce){ #sidebar{ transition:none; } }

  /* ---------- Components ---------- */
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:14px; }
  .card h4{ margin:0 0 10px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .btn{ background:var(--navy); color:#fff; padding:9px 16px; font-weight:600; }
  .btn.ghost{ background:var(--chip); color:var(--navy); }
  .btn.gold{ background:var(--gold-bright); color:var(--navy-deep); }
  .btn.danger{ background:#F7E2DF; color:var(--danger); }
  .btn.sm{ padding:5px 10px; font-size:12.5px; }
  .btn.big{ padding:13px 20px; font-size:15.5px; }   /* comfortable on a phone — the answer most brethren tap */
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .chip{ display:inline-block; background:var(--chip); color:var(--navy); border-radius:999px; padding:2px 10px; font-size:12px; font-weight:600; }
  .chip.gold{ background:#F7ECC9; color:#7A6114; }
  .muted{ color:var(--muted); } .small{ font-size:12.5px; }
  .tablewrap{ overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  th{ text-align:left; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:6px 8px; border-bottom:2px solid var(--line); }
  td{ padding:9px 8px; border-bottom:1px solid var(--chip); white-space:nowrap; vertical-align:middle; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; font-weight:600; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:560px){ .grid2{ grid-template-columns:1fr; } }
  .meetcards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .meetcard{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center; cursor:pointer; }
  .meetcard:hover{ border-color:var(--gold); }
  .meetcard b{ font-family:var(--serif); color:var(--navy-deep); font-size:17px; display:block; }
  .meetcard span{ font-size:12px; color:var(--muted); }
  .meetcard .type{ display:block; margin-top:6px; font-size:12px; color:#7A6114; font-weight:600; }

  .stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(104px,1fr)); gap:10px; }
  .stat{ background:var(--chip); border-radius:10px; padding:12px 10px; text-align:center; }
  .stat b{ display:block; font-family:var(--serif); font-size:26px; color:var(--navy-deep); line-height:1.1; }
  .stat span{ display:block; font-size:11.5px; color:var(--muted); margin-top:3px; }
  .stat.gold{ background:#F7ECC9; } .stat.gold b{ color:#7A6114; } .stat.gold span{ color:#7A6114; font-weight:600; }
  summary::-webkit-details-marker{ color:var(--gold); }

  .todo{ display:flex; align-items:center; gap:10px; padding:8px 2px; border-bottom:1px solid var(--chip); flex-wrap:wrap; }
  .todo:last-child{ border-bottom:none; }
  .todo input[type=checkbox]{ width:18px; height:18px; accent-color:var(--navy); flex:none; }
  .todo .who{ font-weight:600; color:var(--navy); min-width:90px; font-size:13px; }
  .todo .task{ flex:1; min-width:140px; }
  .todo .due{ margin-left:auto; color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .todo .due.late{ color:var(--danger); font-weight:600; }
  .todo.done .task,.todo.done .who{ opacity:.55; text-decoration:line-through; }

  .msg{ max-width:78%; border-radius:12px; padding:8px 12px; font-size:13.5px; margin:6px 0; width:fit-content; }
  .msg .m{ display:block; font-size:11px; color:var(--muted); margin-bottom:2px; }
  .msg.them{ background:var(--chip); border-bottom-left-radius:4px; }
  .msg.me{ background:var(--navy); color:#fff; margin-left:auto; border-bottom-right-radius:4px; }
  .msg.me .m{ color:#B9C0EA; }

  .notice{ border-left:4px solid var(--gold-bright); }
  .empty{ text-align:center; padding:36px 16px; color:var(--muted); }
  .empty img{ width:70px; opacity:.25; border-radius:50%; margin-bottom:8px; }

  /* ---------- Login ---------- */
  #login{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(circle at 50% 20%, #1E2A6E, #141B4D); }
  #login .box{ background:#fff; border-radius:16px; padding:34px 30px; width:100%; max-width:380px; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35); }
  #login img{ width:86px; height:86px; border-radius:50%; border:3px solid var(--gold); }
  #login h1{ font-size:22px; margin:10px 0 2px; }
  #login .sub{ color:var(--muted); font-size:13px; margin-bottom:18px; }
  #login .err{ color:var(--danger); font-size:13px; min-height:18px; margin-top:8px; }
  .namelist{ max-height:250px; overflow-y:auto; text-align:left; border:1px solid var(--line); border-radius:10px; margin-top:10px; }
  .namelist button{ display:block; width:100%; text-align:left; background:none; padding:10px 14px; border-bottom:1px solid var(--chip); border-radius:0; font-size:14px; }
  .namelist button:hover{ background:var(--chip); }

  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--navy-deep); color:#fff;
    padding:10px 20px; border-radius:10px; font-size:13.5px; opacity:0; transition:opacity .25s; z-index:99; pointer-events:none; max-width:90vw; }
  #toast.show{ opacity:1; }
  #toast.err{ background:var(--danger); }
  .photogrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" role="status"></div>

<script>
'use strict';
/* =====================================================================
   Composite Lodge No. 4076 — Lodge Manager
   Single-file PWA. App hosted on GitHub Pages; shared data synced
   through a private GitHub repository (see sync-config.json).
   ===================================================================== */

const PASS_HASH  = '349e94234777bc351a11c2cade3da87ef03e42c50ba8f06112a67c9ac3917b35';
const OWNER_EMAIL = 'rlakhani1@outlook.com';   // the app owner: full permissions, grants committee rights
const VAPID_PUBLIC = 'BDa2f9ZU_a_qEuTxwyJt25WMKjYAqzw9TJLqh3ieiS78c0LIl9jlJZ6DDGWKXd5nR_R4COcp8U7cULAW56ck23c';
const DATA_REPO  = 'rl1311/composite-lodge-data';
const DATA_API   = 'https://api.github.com/repos/' + DATA_REPO + '/contents/';
const KEY_STORE  = 'lodge_store_v1';
const KEY_SESS   = 'lodge_session_v1';   // {until, name, token}
const SEASONS    = ['2026/27','2027/28','2028/29','2029/30','2030/31'];
const MONTHS     = [ ['october','October','1st meeting',0], ['february','February','2nd meeting',1],
                     ['april','April','3rd meeting',1], ['june','June','4th meeting',1] ];
const MEETING_TYPES = ['Initiation','Passing','Raising','Installation','Regular meeting','Emergency meeting','White Table evening'];
const RANKS   = ['Grand Rank','Provincial Rank','Past Master','Master Mason','Fellow Craft','Entered Apprentice'];
/* Festive Board booking — the questions the lodge's dining form has always asked */
const MEALS    = ['Non Veg','Veg','Fish','Other'];
const DESSERTS = ['Kulfi','Rice Pudding'];
const PAYMENTS = ['Online Transfer','Cash'];
const OFFICES = ['Worshipful Master','Immediate Past Master','Senior Warden','Junior Warden','Chaplain','Treasurer',
                 'Secretary','Director of Ceremonies','Senior Deacon','Junior Deacon','Assistant DC','Almoner',
                 'Charity Steward','Mentor','Inner Guard','Steward','Tyler'];

/* ---------------- utilities ---------------- */
const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
/* a name safe to drop inside a JS single-quoted string that itself sits inside an
   HTML attribute — without this, a brother named O'Connor breaks his own buttons */
const jsq = s => esc(String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const now = () => Date.now();
function toast(msg, isErr){ const t=$('#toast'); t.textContent=msg; t.className='show'+(isErr?' err':''); clearTimeout(t._h); t._h=setTimeout(()=>t.className='',3200); }
function fmtDate(d){ if(!d) return ''; const x=new Date(d+'T00:00'); return isNaN(x)?d:x.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function isLate(d){ return d && d < new Date().toISOString().slice(0,10); }

/* ---------------- calendar files (.ics) ----------------
   Generated on the device — works with iPhone, Android, Outlook and Google
   Calendar alike, and needs no lodge Google account. */
function icsEsc(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/[;,]/g, m=>'\\'+m).replace(/\r?\n/g,'\\n'); }
function icsStamp(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; }
function icsDay(dateStr){ return dateStr.replace(/-/g,''); }
/* free-text times such as "18:30 for 19:00" — take the first clock time we find */
function firstClockTime(t){ const m=/(\d{1,2})[:.](\d{2})/.exec(t||''); return m? {h:+m[1], mi:+m[2]} : null; }
function icsEvent(uidStr, dateStr, timeText, title, place, notes){
  if(!dateStr) return '';
  const clock = firstClockTime(timeText);
  let dtStart, dtEnd;
  if(clock){
    const s = new Date(dateStr+'T00:00'); s.setHours(clock.h, clock.mi, 0, 0);
    const e = new Date(s.getTime() + 3*3600*1000);          // lodge meetings run about three hours
    const local = d => d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')
                     +'T'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0')+'00';
    dtStart = 'DTSTART:'+local(s); dtEnd = 'DTEND:'+local(e);
  }else{
    // all-day events end on the following day; work in UTC so British Summer Time
    // can't roll the end date back onto the start date
    const e = new Date(dateStr+'T00:00:00Z'); e.setUTCDate(e.getUTCDate()+1);
    dtStart = 'DTSTART;VALUE=DATE:'+icsDay(dateStr);
    dtEnd   = 'DTEND;VALUE=DATE:'+icsDay(e.toISOString().slice(0,10));
  }
  return ['BEGIN:VEVENT','UID:'+String(uidStr).replace(/[^\w.-]/g,'-')+'@composite4076','DTSTAMP:'+icsStamp(new Date()),
    dtStart, dtEnd, 'SUMMARY:'+icsEsc(title),
    place?'LOCATION:'+icsEsc(place):'', notes?'DESCRIPTION:'+icsEsc(notes):'',
    'END:VEVENT'].filter(Boolean).join('\r\n');
}
function downloadIcs(filename, events){
  const body = events.filter(Boolean);
  if(!body.length){ toast('Set a date first, then it can be added to your calendar.', true); return; }
  const text = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Composite Lodge 4076//Lodge Manager//EN',
                'CALSCALE:GREGORIAN', ...body, 'END:VCALENDAR'].join('\r\n');
  const blob = new Blob([text], {type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  toast('Calendar file downloaded — open it to add it to your calendar.');
}

/* ---------------- attendance helpers ----------------
   store.meetings[id].attend is keyed by member id:
     { status:'yes'|'no', dining:true/false, at:timestamp, by:name } */
function meetingTitle(m){
  const row = MONTHS.find(x=>x[0]===m.month);
  if(!row) return 'Lodge meeting';
  const year = Number(m.season.slice(0,4)) + row[3];
  return row[1]+' '+year+(m.type? ' — '+m.type : '');
}
function attendOf(m, memberId){ return (m.attend||{})[memberId] || null; }
function attendTally(m){
  const attend = m.attend||{};
  const live = new Set(store.members.filter(x=>!x.deleted).map(x=>x.id));
  let yes=0, no=0, dining=0;
  Object.keys(attend).forEach(id=>{
    if(!live.has(id)) return;                     // ignore answers from removed members
    const a = attend[id];
    if(a.status==='yes'){ yes++; if(a.dining) dining++; }
    else if(a.status==='no') no++;
  });
  const vis = (m.visitors||[]).filter(v=>!v.deleted);
  return { yes, no, dining, visitors:vis.length, visitorsDining:vis.filter(v=>v.dining).length,
           awaiting: store.members.filter(x=>!x.deleted).length - yes - no,
           totalDining: dining + vis.filter(v=>v.dining).length };
}
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
/* base64 for upload — via FileReader, which handles megabytes without the
   stack trouble of building the string a character at a time */
function fileToBase64(file){
  return new Promise((res, rej)=>{
    const r = new FileReader();
    r.onload  = () => res(String(r.result).split(',')[1]);
    r.onerror = () => rej(new Error('the file could not be read'));
    r.readAsDataURL(file);
  });
}
function fmtSize(n){
  if(!n && n!==0) return '';
  if(n < 1024) return n+' bytes';
  if(n < 1024*1024) return Math.round(n/1024)+' KB';
  return (n/1024/1024).toFixed(1).replace(/\.0$/,'')+' MB';
}
function fileIcon(name){
  const e = (name||'').split('.').pop().toLowerCase();
  if(e==='pdf') return '📕';
  if(['doc','docx','rtf','odt'].includes(e)) return '📘';
  if(['xls','xlsx','csv'].includes(e)) return '📗';
  if(['png','jpg','jpeg','gif','heic','webp'].includes(e)) return '🖼';
  return '📄';
}
function b64encode(str){ const bytes=new TextEncoder().encode(str); let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); }
function b64decode(b64){ const bin=atob(b64.replace(/\n/g,'')); const bytes=Uint8Array.from(bin, c=>c.charCodeAt(0)); return new TextDecoder().decode(bytes); }

/* ---------------- data store ---------------- */
function freshStore(){
  const meetings = {};
  SEASONS.forEach(se => MONTHS.forEach(([key]) => {
    meetings[se+'|'+key] = { id:se+'|'+key, season:se, month:key, type:'', date:'', time:'', place:'',
                             notes:'', festive:'', fieldsAt:0, todos:[], attend:{}, visitors:[], files:[],
                             dnVenue:'', dnFee:'', dnPay:'', dnBy:'' };
  }));
  return { members:[], meetings, events:[], notices:[], photos:{albumUrl:'', updatedAt:0},
           lodgeChat:[], perms:{managers:[], updatedAt:0}, todos:[], push:[], subs:[],
           subsRate:{amount:'', updatedAt:0} };
}
function load(){
  try{
    const raw = localStorage.getItem(KEY_STORE);
    if(raw){ const d = JSON.parse(raw); return {...freshStore(), ...d, meetings:{...freshStore().meetings, ...(d.meetings||{})}}; }
  }catch(e){}
  return freshStore();
}
function save(){ localStorage.setItem(KEY_STORE, JSON.stringify(store)); }
let store = load();

/* ---------------- session ---------------- */
function getSession(){ try{ const s=JSON.parse(localStorage.getItem(KEY_SESS)||'null'); return (s && s.until>now())?s:null; }catch(e){ return null; } }
function setSession(s){ localStorage.setItem(KEY_SESS, JSON.stringify(s)); }
let session = getSession();

/* ---------------- member ordering: alphabetical by name ---------------- */
function sortedMembers(){
  return store.members.filter(m=>!m.deleted).slice().sort((a,b)=>a.name.localeCompare(b.name));
}
function memberById(id){ return store.members.find(m=>m.id===id); }

/* ---------------- permissions ----------------
   Owner = the member whose email is OWNER_EMAIL (matched to the signed-in name).
   Managers = members the owner has granted committee/chat rights in Settings.
   Until an owner record exists in Members (initial setup), everyone can manage. */
/* Which member record is the signed-in person? The record chosen at sign-in is
   remembered outright; matching on the name alone is only a fallback, because a
   brother who signs in as "Charlie" is still "Charles Whitfield" in the list. */
function currentMember(){
  if(!session) return null;
  if(session.memberId){
    const m = store.members.find(x=>!x.deleted && x.id===session.memberId);
    if(m) return m;
  }
  // Falling back to the name only ever reaches records the lodge holds no email
  // for. A record with an email address can be claimed only by proving it.
  if(!session.name) return null;
  return store.members.find(m=>!m.deleted && !(m.email||'').trim() &&
    m.name.trim().toLowerCase()===session.name.trim().toLowerCase()) || null;
}
/* A session is "verified" only when the person proved the email address held
   against his record. Office and permissions hang off this, so that knowing the
   shared passcode is never enough on its own to sign in as the Secretary. */
function isVerified(){ return !!(session && session.verified && currentMember()); }
/* Shown wherever the app needs to know who you are but hasn't been told.
   Identity comes from the email address the brother himself registered — never
   from a list of names anyone could pick out of. */
function identifyHtml(lead){
  const ms = sortedMembers();
  if(!ms.length) return `<p class="small muted">${lead} There are no members in the list yet — ask the Secretary to add you.</p>`;
  const noEmail = ms.filter(m=>!(m.email||'').trim());
  return `
    <div style="background:#FBF7E8;border:1px solid #E8DCAF;border-radius:10px;padding:14px 16px;">
      <b style="font-family:var(--serif);font-size:15.5px;color:var(--navy-deep);">Confirm who you are</b>
      <p class="small" style="margin:6px 0 10px;">${lead} Enter the email address you gave the lodge and the app will find your record.</p>
      <div class="row">
        <input id="me_email" type="email" autocomplete="email" placeholder="your@email.com" style="max-width:250px;"
          onkeydown="if(event.key==='Enter')App.verifyEmail()">
        <button class="btn" onclick="App.verifyEmail()">Confirm</button>
      </div>
      ${noEmail.length? `
      <details style="margin-top:12px;">
        <summary class="small" style="cursor:pointer;color:var(--navy);">The lodge doesn’t have my email address</summary>
        <div class="row" style="margin-top:8px;">
          <select id="me_pick" style="max-width:230px;">
            <option value="">Choose your name…</option>
            ${noEmail.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}
          </select>
          <button class="btn ghost" onclick="App.linkMe()">That’s me</button>
        </div>
        <p class="small muted" style="margin-top:8px;">Only brethren whose email address the lodge does not hold appear here, and choosing a name this way never carries any office or permission. Ask the Secretary to add your address so the app can recognise you properly.</p>
      </details>` : ''}
    </div>`;
}
function ownerMember(){ return store.members.find(m=>!m.deleted && (m.email||'').trim().toLowerCase()===OWNER_EMAIL) || null; }
function isOwnerRecord(m){ return (m.email||'').trim().toLowerCase()===OWNER_EMAIL; }
function isOwner(){
  const me=currentMember();
  return !!(isVerified() && me && (me.email||'').trim().toLowerCase()===OWNER_EMAIL);
}
function canManage(){
  if(isOwner()) return true;
  if(!ownerMember()) return true;               // setup phase — no owner record yet
  if(!isVerified()) return false;               // an unproven sign-in never manages
  const me=currentMember();
  return !!(me && (store.perms.managers||[]).includes(me.id));
}
function onCommittee(e){
  const me=currentMember();
  return (e.committee||[]).some(c =>
    (c.memberId && me && c.memberId===me.id) ||
    (c.name && session && c.name.trim().toLowerCase()===session.name.trim().toLowerCase()));
}

/* ---------------- @mentions ---------------- */
const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
function rich(text){
  // escape first, then highlight @Member Name tokens in gold
  let html = esc(text);
  sortedMembers().slice().sort((a,b)=>b.name.length-a.name.length).forEach(m=>{
    html = html.replace(new RegExp('@'+escRe(esc(m.name)), 'gi'),
      x=>`<span style="background:#F7ECC9;color:#7A6114;border-radius:6px;padding:0 4px;font-weight:600;">${x}</span>`);
  });
  return html;
}
function textMentions(text, name){
  return !!text && text.toLowerCase().includes('@'+name.trim().toLowerCase());
}

/* ---------------- notifications ----------------
   Computed from the shared data each render; read-state kept per device. */
const KEY_SEEN = 'lodge_notif_seen_v1';
function getSeen(){ try{ return new Set(JSON.parse(localStorage.getItem(KEY_SEEN)||'[]')); }catch(e){ return new Set(); } }
function markSeen(ids){
  const s=getSeen(); ids.forEach(id=>s.add(id));
  localStorage.setItem(KEY_SEEN, JSON.stringify([...s].slice(-400)));
}
function buildNotifications(){
  if(!session) return [];
  const meName = session.name.trim().toLowerCase();
  const notMe = who => (who||'').trim().toLowerCase() !== meName;
  const out = [];
  const push = (id,icon,text,at,view,sub)=>out.push({id,icon,text,at:at||0,view,sub});
  // tasks assigned to me, and mentions inside tasks — across every to-do list
  const scanTodos = (todos, where, view, sub) => (todos||[]).forEach(t=>{
    if(t.deleted || t.done) return;
    const at = t.createdAt || t.updatedAt;
    if(t.name && t.name.trim().toLowerCase()===meName && t.by && notMe(t.by))
      push('task_'+t.id,'✅', `${t.by} gave you a task in ${where}: “${t.task}”`, at, view, sub);
    else if(textMentions(t.task, session.name) && notMe(t.by))
      push('tm_'+t.id,'🏷', `You were tagged in a task in ${where}: “${t.task}”`, at, view, sub);
  });
  scanTodos(store.todos, 'the lodge To-Do list', 'todo', null);
  Object.values(store.meetings).forEach(m=>{
    const [,label,,off] = MONTHS.find(x=>x[0]===m.month);
    scanTodos(m.todos, label+' '+(Number(m.season.slice(0,4))+off)+' meeting', 'meetings', m.id);
  });
  store.events.filter(e=>!e.deleted).forEach(e=>scanTodos(e.todos, '“'+e.name+'”', 'events', e.id));
  // mentions in chats I can see
  (store.lodgeChat||[]).forEach(c=>{
    if(notMe(c.who) && textMentions(c.text, session.name))
      push('lc_'+c.id,'💬', `${c.who} tagged you in Lodge Chat: “${c.text}”`, c.at, 'chat', null);
  });
  store.events.filter(e=>!e.deleted && (onCommittee(e)||isOwner())).forEach(e=>(e.chat||[]).forEach(c=>{
    if(notMe(c.who) && textMentions(c.text, session.name))
      push('ec_'+c.id,'💬', `${c.who} tagged you in the “${e.name}” chat: “${c.text}”`, c.at, 'events', e.id);
  }));
  // meeting documents — everyone but whoever added them
  Object.values(store.meetings).forEach(m=>(m.files||[]).forEach(f=>{
    if(f.deleted || !notMe(f.by)) return;
    push('fl_'+f.id,'📎', `${f.by} added “${f.name}” to ${meetingTitle(m)}`, f.at, 'meetings', m.id);
  }));
  // Festive Board bookings — the Secretary and whoever he has permitted
  if(canManage()) Object.values(store.meetings).forEach(m=>{
    const where = meetingTitle(m);
    Object.keys(m.attend||{}).forEach(k=>{
      const a = m.attend[k], mem = memberById(k);
      if(!a.dining || !a.meal || !mem || mem.deleted || !notMe(mem.name)) return;
      push('dn_'+m.id+'|'+k,'🍽', `${mem.name} booked for the Festive Board (${a.meal}) — ${where}`, a.at, 'meetings', m.id);
    });
    (m.visitors||[]).filter(v=>!v.deleted && v.dining && v.meal).forEach(v=>
      push('dnv_'+v.id,'🍽', `${v.name}, visiting${v.host?' with '+v.host:''}, booked for the Festive Board (${v.meal}) — ${where}`,
        v.updatedAt, 'meetings', m.id));
  });
  // new notices, for everyone but the author
  store.notices.filter(n=>!n.deleted && notMe(n.by)).forEach(n=>
    push('nt_'+n.id,'📌', `New notice from ${n.by}: “${n.title}”`, n.at, 'notices', null));
  // photo album linked / changed
  if(store.photos.albumUrl)
    push('ph_'+(store.photos.updatedAt||0),'📷','The lodge photo album was updated', store.photos.updatedAt, 'photos', null);
  return out.sort((a,b)=>b.at-a.at).slice(0,100);
}
function unreadCount(){ const seen=getSeen(); return buildNotifications().filter(n=>!seen.has(n.id)).length; }
let _lastUnread = 0;
function maybeDeviceNotify(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const n = unreadCount();
  if(n > _lastUnread && document.visibilityState!=='visible'){
    navigator.serviceWorker.ready.then(r=>r.showNotification('Composite Lodge No. 4076',
      {body:'You have '+n+' new notification'+(n>1?'s':'')+' in the lodge app.', icon:'./icon-192.png', badge:'./icon-192.png'})).catch(()=>{});
  }
  _lastUnread = n;
}

/* =====================================================================
   SYNC — shared data in a private GitHub repo (contents API)
   ===================================================================== */
let syncCfg = null;          // from sync-config.json
async function loadSyncCfg(){
  try{ syncCfg = await (await fetch('./sync-config.json?v='+Date.now())).json(); }
  catch(e){ syncCfg = {configured:false}; }
}
async function decryptToken(passcode){
  if(!syncCfg || !syncCfg.configured) return null;
  try{
    const enc = new TextEncoder();
    const salt = Uint8Array.from(atob(syncCfg.salt), c=>c.charCodeAt(0));
    const iv   = Uint8Array.from(atob(syncCfg.iv),   c=>c.charCodeAt(0));
    const ct   = Uint8Array.from(atob(syncCfg.ct),   c=>c.charCodeAt(0));
    const base = await crypto.subtle.importKey('raw', enc.encode(passcode), 'PBKDF2', false, ['deriveKey']);
    const key  = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
                   base, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    return new TextDecoder().decode(pt);
  }catch(e){ return null; }
}
function ghHeaders(){ return { 'Authorization':'token '+session.token, 'Accept':'application/vnd.github+json' }; }
async function ghGet(path){
  const r = await fetch(DATA_API+path+'?ref=main&t='+Date.now(), {headers:ghHeaders(), cache:'no-store'});
  if(r.status===404) return null;
  if(!r.ok) throw new Error('GitHub read failed ('+r.status+')');
  return r.json();
}
async function ghPut(path, contentB64, message, sha){
  const body = {message, content:contentB64, branch:'main'};
  if(sha) body.sha = sha;
  const r = await fetch(DATA_API+path, {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
  if(!r.ok) throw new Error('GitHub write failed ('+r.status+')');
  return r.json();
}
async function ghDelete(path, sha, message){
  const r = await fetch(DATA_API+path, {method:'DELETE', headers:ghHeaders(),
    body:JSON.stringify({message, sha, branch:'main'})});
  return r.ok;
}

/* ---- merging: newest updatedAt wins; lists merged by id ---- */
function mergeById(a, b){
  const map = new Map();
  (a||[]).forEach(x=>map.set(x.id, x));
  (b||[]).forEach(x=>{ const cur=map.get(x.id); if(!cur || (x.updatedAt||0)>(cur.updatedAt||0)) map.set(x.id, x); });
  return [...map.values()];
}
function mergeChat(a, b){
  const map = new Map();
  (a||[]).concat(b||[]).forEach(x=>map.set(x.id, x));
  return [...map.values()].sort((x,y)=>x.at-y.at);
}
/* attendance is keyed by member id — each brother's own answer wins on its own timestamp,
   so two people answering on two devices never overwrite each other */
function mergeAttend(a, b){
  const out = {...(a||{})};
  Object.keys(b||{}).forEach(k=>{
    const cur = out[k], nxt = b[k];
    if(!cur || (nxt.at||0) > (cur.at||0)) out[k] = nxt;
  });
  return out;
}
function mergeStores(remote, local){
  if(!remote) return local;
  const out = freshStore();
  out.members = mergeById(remote.members, local.members);
  out.notices = mergeById(remote.notices, local.notices);
  // meetings: fixed keys; scalars by fieldsAt, todos by id
  Object.keys(out.meetings).forEach(k=>{
    const r=(remote.meetings||{})[k], l=(local.meetings||{})[k], base=out.meetings[k];
    const scal = (r && l) ? ((r.fieldsAt||0)>=(l.fieldsAt||0)?r:l) : (r||l||base);
    out.meetings[k] = {...base, type:scal.type||'', date:scal.date||'', time:scal.time||'', place:scal.place||'',
      notes:scal.notes||'', festive:scal.festive||'', fieldsAt:scal.fieldsAt||0,
      dnVenue:scal.dnVenue||'', dnFee:scal.dnFee||'', dnPay:scal.dnPay||'', dnBy:scal.dnBy||'',
      todos:mergeById(r&&r.todos, l&&l.todos),
      attend:mergeAttend(r&&r.attend, l&&l.attend),
      visitors:mergeById(r&&r.visitors, l&&l.visitors),
      files:mergeById(r&&r.files, l&&l.files)};
  });
  // events: scalars by fieldsAt; todos & chat merged
  const evMap = new Map();
  (remote.events||[]).forEach(e=>evMap.set(e.id, e));
  (local.events||[]).forEach(l=>{
    const r = evMap.get(l.id);
    if(!r){ evMap.set(l.id, l); return; }
    const scal = (r.fieldsAt||0)>=(l.fieldsAt||0)?r:l;
    evMap.set(l.id, {...scal, todos:mergeById(r.todos,l.todos), chat:mergeChat(r.chat,l.chat)});
  });
  out.events = [...evMap.values()];
  out.photos = ((remote.photos||{}).updatedAt||0) >= ((local.photos||{}).updatedAt||0) ? (remote.photos||out.photos) : local.photos;
  out.lodgeChat = mergeChat(remote.lodgeChat, local.lodgeChat);
  out.perms = ((remote.perms||{}).updatedAt||0) >= ((local.perms||{}).updatedAt||0) ? (remote.perms||out.perms) : local.perms;
  out.todos = mergeById(remote.todos, local.todos);
  out.push = mergeById(remote.push, local.push);
  out.subs = mergeById(remote.subs, local.subs);
  out.subsRate = ((remote.subsRate||{}).updatedAt||0) >= ((local.subsRate||{}).updatedAt||0)
    ? (remote.subsRate||out.subsRate) : local.subsRate;
  return out;
}

/* ids of things that can generate a notification — used to decide whether a
   sync commit should wake the push sender ([notify] flag) */
function notifyIds(s){
  const ids = new Set();
  if(!s) return ids;
  const todo = t=>ids.add('t'+t.id);
  (s.todos||[]).forEach(todo);
  Object.values(s.meetings||{}).forEach(m=>(m.todos||[]).forEach(todo));
  (s.events||[]).forEach(e=>{ (e.todos||[]).forEach(todo); (e.chat||[]).forEach(c=>ids.add('c'+c.id)); });
  (s.lodgeChat||[]).forEach(c=>ids.add('c'+c.id));
  (s.notices||[]).forEach(n=>ids.add('n'+n.id));
  // a Festive Board booking is worth waking the Secretary for; changing an
  // existing one is not, so the id deliberately carries no timestamp
  Object.values(s.meetings||{}).forEach(m=>{
    Object.keys(m.attend||{}).forEach(k=>{ if(m.attend[k].dining) ids.add('d'+m.id+'|'+k); });
    (m.visitors||[]).forEach(v=>{ if(v.dining && !v.deleted) ids.add('dv'+v.id); });
    (m.files||[]).forEach(f=>{ if(!f.deleted) ids.add('f'+f.id); });   // the summons is worth knowing about
  });
  ids.add('p'+((s.photos||{}).updatedAt||0));
  return ids;
}
function hasNewNotifiable(remote, merged){
  const before = notifyIds(remote);
  for(const id of notifyIds(merged)) if(!before.has(id)) return true;
  return false;
}

let syncing = false;
async function doSync(silent){
  if(syncing) return;
  if(!session || !session.token){
    if(!silent) toast('Sync is not activated yet — your changes are saved on this device and will sync once activation is complete.', true);
    return;
  }
  syncing = true; updateSyncUi(true);
  try{
    // 1. pull main store
    const file = await ghGet('data.json');
    let remote = null;
    if(file) { try{ remote = JSON.parse(b64decode(file.content)); }catch(e){} }
    let merged = mergeStores(remote, store);
    // 2. pull in any member-form submissions
    try{
      const subs = await ghGet('submissions');
      if(Array.isArray(subs)){
        for(const s of subs){
          if(!s.name.endsWith('.json')) continue;
          const f = await ghGet('submissions/'+s.name);
          try{
            const m = JSON.parse(b64decode(f.content));
            const existing = merged.members.find(x=>!x.deleted && x.email && m.email && x.email.toLowerCase()===m.email.toLowerCase());
            if(existing){ Object.assign(existing, {name:m.name, phone:m.phone, email:m.email, rank:m.rank, office:m.office, updatedAt:now()}); }
            else merged.members.push({id:uid(), name:m.name, phone:m.phone, email:m.email, rank:m.rank, office:m.office, updatedAt:now()});
          }catch(e){}
          await ghDelete('submissions/'+s.name, f.sha, 'Merged member form submission');
        }
      }
    }catch(e){ /* submissions folder may not exist yet */ }
    // 3. keep this device's push registration pointing at the current user
    const did = localStorage.getItem('lodge_device_id');
    if(did){
      const pe = (merged.push||[]).find(x=>x.id===did);
      if(pe && pe.name !== session.name){ pe.name = session.name; pe.updatedAt = now(); }
    }
    // 4. push merged — but only when something actually changed
    const mergedText = JSON.stringify(merged);
    const remoteText = file ? b64decode(file.content) : null;
    if(mergedText !== remoteText){
      const flag = hasNewNotifiable(remote, merged) ? ' [notify]' : '';
      await ghPut('data.json', b64encode(mergedText), 'Sync by '+(session.name||'member')+flag, file?file.sha:undefined);
    }
    store = merged; save();
    localStorage.setItem('lodge_last_sync', String(now()));
    if(!silent) toast('Synced — everyone’s latest changes are in.');
  }catch(e){
    toast('Sync failed: '+e.message+'. Check your internet connection and try again.', true);
  }finally{
    syncing = false; updateSyncUi(false);
    App.rerender();
    maybeDeviceNotify();
  }
}
function updateSyncUi(busy){
  const b=$('#syncbtn'); if(b){ b.disabled=busy; b.textContent = busy?'Syncing…':'⟳ Sync'; }
}
function lastSyncText(){
  const t = Number(localStorage.getItem('lodge_last_sync')||0);
  if(!t) return 'Not synced yet';
  const d=new Date(t), today=new Date();
  return 'Last synced: '+(d.toDateString()===today.toDateString()
    ? 'today '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
    : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
}

function todosFor(ctx){
  if(ctx==='gen') return (store.todos = store.todos||[]);
  if(ctx.startsWith('mt_')) { const m = store.meetings[ctx.slice(3)]; return m ? (m.todos = m.todos||[]) : []; }
  if(ctx.startsWith('ev_')) { const e = store.events.find(x=>x.id===ctx.slice(3)); return e ? (e.todos = e.todos||[]) : []; }
  return [];
}

        <div class="field" style="margin-top:10px;"><label>Meal</label>${sel('dn_meal_'+ctx, MEALS, rec.meal)}</div>
        <div class="field"><label>Dessert</label>${sel('dn_dess_'+ctx, DESSERTS, rec.dessert)}</div>
        <div class="field"><label>Payment</label>${sel('dn_pay_'+ctx, PAYMENTS, rec.pay)}</div>
        <div class="field"><label>If you have sent a transfer, when? (optional)</label>
          <input type="date" id="dn_on_${ctx}" value="${esc(rec.paidOn||'')}" style="max-width:170px;"></div>
        ${m.dnPay?`<div class="small muted" style="margin:2px 0 10px;white-space:pre-wrap;">${esc(m.dnPay)}</div>`:''}
        <button class="btn big" onclick="App.saveDining('${m.id}','${scope}','${key}')">Save my choices</button>
        ${answered?`<button class="btn ghost" onclick="App.editDining(null)">Cancel</button>`:''}

  },
  editDining(ctx){ this._editDining = ctx; this.renderShell(); },
  saveDining(mid, scope, key){
    const m = store.meetings[mid]; if(!m) return;
    const ctx = scope+key;
    const g = id => { const e=document.getElementById(id); return e ? e.value : ''; };
    const meal = g('dn_meal_'+ctx);
    if(!meal){ toast('Please choose a meal.', true); return; }
    const patch = {meal, dessert:g('dn_dess_'+ctx), pay:g('dn_pay_'+ctx), paidOn:g('dn_on_'+ctx)};
    if(scope==='m'){
      const me = currentMember();
      if(!canManage() && (!me || me.id!==key)){ toast('You can only book for yourself.', true); return; }
      m.attend = m.attend||{};
      m.attend[key] = {...(m.attend[key]||{}), status:'yes', dining:true, ...patch, at:now(), by:session.name};
    }else{
      const v = (m.visitors||[]).find(x=>x.id===key);
      if(!v) return;
      Object.assign(v, patch, {dining:true, updatedAt:now()});
    }
    this._editDining = null;
    save(); this.renderShell(); doSync(true);
    toast('Booking saved — the Secretary sees it on the next sync.');
  },

  setAttend(mid, memberId, status){
    const m = store.meetings[mid]; if(!m) return;
    const me = currentMember();
    if(!canManage() && (!me || me.id!==memberId)){ toast('You can only answer for yourself.', true); return; }
    m.attend = m.attend||{};
    const prev = m.attend[memberId]||{};
    m.attend[memberId] = {status, dining: status==='yes' ? !!prev.dining : false, at:now(), by:session.name};
    save(); this.renderShell(); doSync(true);
  },
  setDining(mid, memberId, dining){
    const m = store.meetings[mid]; if(!m) return;
    const me = currentMember();
    if(!canManage() && (!me || me.id!==memberId)){ toast('You can only answer for yourself.', true); return; }
    m.attend = m.attend||{};
    const prev = m.attend[memberId]||{status:'yes'};
    m.attend[memberId] = {...prev, status:'yes', dining:!!dining, at:now(), by:session.name};
    save(); this.renderShell(); doSync(true);
  },

  /* ---------- meeting documents: summons, table plan and the like ----------
     Everyone can read them; only the Secretary and those he has permitted may
     add or remove. Files themselves live in the private data repository, the
     same place notice attachments go. */
  filesCard(m){
    const files = (m.files||[]).filter(f=>!f.deleted).sort((a,b)=>(b.at||0)-(a.at||0));
    const manage = canManage();
    return `
      <div class="card"><h4>Documents</h4>
        ${files.length? files.map(f=>`
          <div class="row" style="padding:9px 2px;border-bottom:1px solid var(--chip);flex-wrap:nowrap;">
            <span style="font-size:20px;flex:none;" aria-hidden="true">${fileIcon(f.name)}</span>
            <span style="flex:1;min-width:0;">
              <b style="word-break:break-word;">${esc(f.name)}</b>
              <span class="muted small" style="display:block;">${fmtSize(f.size)}${f.by?' · added by '+esc(f.by):''}${f.at?' · '+fmtDate(new Date(f.at).toISOString().slice(0,10)):''}</span>
            </span>
            <button class="btn ghost sm" style="flex:none;" onclick="App.fileOpen('${m.id}','${f.id}')">Open</button>
            ${manage?`<button class="btn danger sm" style="flex:none;" onclick="App.fileDel('${m.id}','${f.id}')" aria-label="Remove ${esc(f.name)}">✕</button>`:''}
          </div>`).join('')
        : `<div class="muted small">No documents yet${manage?' — add the summons, the table plan or anything else the brethren need.':'. The Secretary puts the summons and table plan here.'}</div>`}
        ${manage? `
        <div class="row" style="margin-top:12px;">
          <input type="file" id="mf_files_${m.id}" multiple style="max-width:260px;">
          <button class="btn sm" id="mf_btn_${m.id}" onclick="App.filesAdd('${m.id}')">Add document</button>
        </div>
        <div class="muted small" style="margin-top:8px;">PDF, Word, images — up to 5 MB each. You can choose several at once. Everyone in the lodge can open them; only you and those you have permitted can add or remove.</div>
        ` : ''}
      </div>`;
  },
  async filesAdd(mid){
    const m = store.meetings[mid]; if(!m) return;
    if(!canManage()){ toast('Only the Secretary and those he has permitted can add documents.', true); return; }
    const input = document.getElementById('mf_files_'+mid);
    const chosen = [...(input.files||[])];
    if(!chosen.length){ toast('Choose a file first.', true); return; }
    if(!session.token){ toast('Documents need sync to be activated — ask the Secretary.', true); return; }
    const btn = document.getElementById('mf_btn_'+mid);
    if(btn){ btn.disabled = true; btn.textContent = 'Uploading…'; }
    let added = 0, failed = [];
    for(const f of chosen){
      if(f.size > 5*1024*1024){ failed.push(f.name+' (over 5 MB)'); continue; }
      try{
        const id = uid();
        const path = 'attachments/' + mid.replace(/[^\w-]/g,'-') + '-' + id + '-' + f.name.replace(/[^\w.\-]+/g,'_');
        await ghPut(path, await fileToBase64(f), 'Meeting document: ' + f.name);
        (m.files = m.files||[]).push({id, name:f.name, path, size:f.size, by:session.name, at:now(), updatedAt:now()});
        added++;
      }catch(e){ failed.push(f.name); }
    }
    save(); this.renderShell();
    if(added) doSync(true);
    if(failed.length) toast((added?added+' added. ':'') + 'Could not upload: ' + failed.join(', '), true);
    else toast(added===1 ? 'Document added.' : added + ' documents added.');
  },
  async fileOpen(mid, fid){
    const f = ((store.meetings[mid]||{}).files||[]).find(x=>x.id===fid);
    if(!f) return;
    if(!session.token){ toast('Sync needs to be activated to open documents.', true); return; }
    try{
      const got = await ghGet(f.path);
      const bin = atob(got.content.replace(/\n/g,''));
      const bytes = Uint8Array.from(bin, c=>c.charCodeAt(0));
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([bytes]));
      a.download = f.name; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    }catch(e){ toast('Could not open that document: '+e.message, true); }
  },
  async fileDel(mid, fid){
    if(!canManage()){ toast('Only the Secretary and those he has permitted can remove documents.', true); return; }
    const f = ((store.meetings[mid]||{}).files||[]).find(x=>x.id===fid);
    if(!f || !confirm('Remove “'+f.name+'” from this meeting?')) return;
    f.deleted = true; f.updatedAt = now();
    save(); this.renderShell(); doSync(true); toast('Document removed.');
    try{ const got = await ghGet(f.path); if(got) await ghDelete(f.path, got.sha, 'Removed meeting document: '+f.name); }
    catch(e){ /* the record is gone either way; a stray blob is harmless */ }
  },

  /* ---------- the Secretary's dining list ---------- */
  diningRows(m){
    const rows = [];
    Object.keys(m.attend||{}).forEach(id=>{
      const a = m.attend[id], mem = memberById(id);
      if(!a.dining || !mem || mem.deleted) return;
      rows.push({name:mem.name, guest:'', meal:a.meal||'', dessert:a.dessert||'', pay:a.pay||'', paidOn:a.paidOn||''});
    });
    (m.visitors||[]).filter(v=>!v.deleted && v.dining).forEach(v=>{
      rows.push({name:v.name, guest:[v.lodge, v.host?'guest of '+v.host:''].filter(Boolean).join(', '),
                 meal:v.meal||'', dessert:v.dessert||'', pay:v.pay||'', paidOn:v.paidOn||''});
    });
    return rows.sort((a,b)=>a.name.localeCompare(b.name));
  },
  diningListCard(m){
    const rows = this.diningRows(m);
    const tally = key => { const c={}; rows.forEach(r=>{ const v=r[key]||'not yet chosen'; c[v]=(c[v]||0)+1; }); return c; };
    const chips = c => Object.keys(c).sort().map(k=>`<span class="chip ${k==='not yet chosen'?'':'gold'}">${esc(k)} — ${c[k]}</span>`).join(' ');
    const outstanding = rows.filter(r=>!r.meal).length;
    return `
      <div class="card"><h4>Festive Board — dining list</h4>
        ${rows.length? `
        <div class="stats" style="margin-bottom:12px;">
          <div class="stat gold"><b>${rows.length}</b><span>dining in total</span></div>
          <div class="stat"><b>${rows.length-outstanding}</b><span>choices in</span></div>
          <div class="stat"><b>${outstanding}</b><span>still to choose</span></div>
        </div>
        <div style="margin-bottom:6px;"><span class="small muted">Meals:</span> ${chips(tally('meal'))}</div>
        <div style="margin-bottom:12px;"><span class="small muted">Desserts:</span> ${chips(tally('dessert'))}</div>
        <div class="tablewrap"><table>
          <tr><th>Name</th><th>Guest of</th><th>Meal</th><th>Dessert</th><th>Payment</th><th>Transfer sent</th></tr>
          ${rows.map(r=>`<tr>
            <td><b>${esc(r.name)}</b></td>
            <td>${esc(r.guest)||'<span class="muted">—</span>'}</td>
            <td>${r.meal?esc(r.meal):'<span class="chip">not yet chosen</span>'}</td>
            <td>${esc(r.dessert)||'<span class="muted">—</span>'}</td>
            <td>${esc(r.pay)||'<span class="muted">—</span>'}</td>
            <td>${r.paidOn?fmtDate(r.paidOn):'<span class="muted">—</span>'}</td>
          </tr>`).join('')}
        </table></div>
        <div class="row" style="margin-top:12px;">
          <button class="btn ghost sm" onclick="App.copyDining('${m.id}')">📋 Copy the list</button>
          <button class="btn ghost sm" onclick="App.exportDining('${m.id}')">⬇ Download as a spreadsheet</button>
          <button class="btn ghost sm" onclick="App.emailDining('${m.id}')">✉ Send it on</button>
        </div>
        <div class="muted small" style="margin-top:8px;">Everything the caterer needs. “Send it on” opens your email with the list already written out.</div>
        ` : '<div class="muted small">Nobody has booked for the Festive Board yet. As brethren tick “staying for the Festive Board” and choose their meal, they appear here.</div>'}
      </div>`;
  },
  diningText(m){
    const rows = this.diningRows(m);
    const counts = {};
    rows.forEach(r=>{ const k=r.meal||'not yet chosen'; counts[k]=(counts[k]||0)+1; });
    return [
      'Composite Lodge No. 4076 — ' + meetingTitle(m),
      m.date ? 'Meeting: ' + fmtDate(m.date) : '',
      m.dnVenue ? 'Venue: ' + m.dnVenue : '',
      '', 'Dining in total: ' + rows.length,
      'Meals: ' + Object.keys(counts).sort().map(k=>k+' — '+counts[k]).join(', '),
      '',
      ...rows.map(r=>[r.name, r.guest, r.meal||'not yet chosen', r.dessert, r.pay,
                      r.paidOn?'transfer sent '+fmtDate(r.paidOn):''].filter(Boolean).join(' · ')),
    ].filter(x=>x!==undefined).join('\n');
  },
  async copyDining(mid){
    const t = this.diningText(store.meetings[mid]);
    try{ await navigator.clipboard.writeText(t); toast('Dining list copied — paste it into an email or a message.'); }
    catch(e){ prompt('Copy the dining list:', t); }
  },
  exportDining(mid){
    const m = store.meetings[mid], rows = this.diningRows(m);
    const q = s => '"' + String(s==null?'':s).replace(/"/g,'""') + '"';
    const csv = [['Name','Guest of','Meal','Dessert','Payment','Transfer sent'].map(q).join(',')]
      .concat(rows.map(r=>[r.name,r.guest,r.meal,r.dessert,r.pay,r.paidOn].map(q).join(','))).join('\r\n');
    const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dining-' + mid.replace(/[|/]/g,'-') + '.csv'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  },
  emailDining(mid){
    const m = store.meetings[mid];
    location.href = 'mailto:?subject=' + encodeURIComponent('Dining list — ' + meetingTitle(m))
      + '&body=' + encodeURIComponent(this.diningText(m));
  },

    else { const nid=uid(); store.events.push({id:nid, committee:[], todos:[], chat:[], ...rec}); save(); this.go('events', nid); }

  eventDel(id){
    if(!confirm('Delete this event, its to-do list and its chat?')) return;
    Object.assign(store.events.find(x=>x.id===id), {deleted:true, fieldsAt:now()});
    save(); this.go('events'); toast('Event deleted.');
  },
  eventDetail(id){

      <button class="btn ghost sm" onclick="App.go('events')">← All events</button>

        <button class="btn ghost sm" onclick="App.go('events','edit:${id}')">Edit details</button>
      </div>
      <div class="card"><h4>Committee</h4>
        <div class="row">
          ${committee.length? committee.map((c,i)=>{
            const m=c.memberId?memberById(c.memberId):null;
            const label = m ? esc(m.name)+(m.phone?' · '+esc(m.phone):'') : esc(c.name)+' *';
            const del = canManage()? ` <a href="#" onclick="App.committeeDel('${id}',${i});return false;" style="text-decoration:none;" aria-label="Remove">✕</a>`:'';

      <div class="card"><h4>Event details</h4>
        <div class="grid2 small">
          <div><b>Date:</b> ${e.date?fmtDate(e.date):'TBC'}</div>
          <div><b>Time:</b> ${esc(e.time)||'TBC'}</div>
          <div style="grid-column:1/-1;"><b>Location:</b> ${esc(e.location)||'TBC'}</div>

          <div class="msg ${c.who===session.name?'me':'them'}">

          </div>`).join('') : '<div class="muted small">No messages yet.</div>'}
        <div class="row" style="margin-top:10px;">
          <input id="chat_text" placeholder="Message the committee — type @ to tag someone…" style="flex:1;" onkeydown="if(event.key==='Enter')App.chatSend('${id}')" oninput="App.mentionInput(event)">
          <button class="btn" onclick="App.chatSend('${id}')">Send</button>
        </div>
        <div class="muted small" style="margin-top:6px;">Only this event's committee can see this chat. Messages reach the others when you (and they) press Sync.</div>

        <div class="muted small">This chat is private to the event's committee. You'll see it here if you are added to the committee.</div>

  eventToCalendar(id){
    const e = store.events.find(x=>x.id===id); if(!e) return;

      [icsEvent(e.id, e.date, e.time, e.name+' — Composite Lodge 4076', e.location, e.notes)]);
  },
  committeeAddMember(id){
    const sel=$('#cm_member'); if(!sel.value) return;
    const e=store.events.find(x=>x.id===id);
    e.committee.push({memberId:sel.value}); e.fieldsAt=now(); save(); this.renderShell();

  committeeAddOutside(id){
    const v=$('#cm_outside').value.trim(); if(!v) return;

    e.committee.push({name:v}); e.fieldsAt=now(); save(); this.renderShell();

  committeeDel(id,i){

    e.committee.splice(i,1); e.fieldsAt=now(); save(); this.renderShell();

  chatSend(id){
    const t=$('#chat_text').value.trim(); if(!t) return;
    const e=store.events.find(x=>x.id===id);
    (e.chat=e.chat||[]).push({id:uid(), who:session.name, text:t, at:now()});

  /* ================= SUBSCRIPTIONS =================
     One record per member per season, id = memberId|season, so two devices
     editing different brethren never collide. Figures are visible only to the
     Secretary/Treasurer and anyone given permission; everyone else sees his own. */
  subFor(memberId, season){
    const id = memberId+'|'+season;
    let r = (store.subs||[]).find(x=>x.id===id);
    if(!r){ r = {id, memberId, season, paid:false, amount:'', paidOn:'', updatedAt:0}; (store.subs=store.subs||[]).push(r); }
    return r;
  },
  view_subs(){
    const season = this.subSeason || SEASONS[0];
    const manage = canManage(), me = currentMember();
    const rate = (store.subsRate||{}).amount||'';
    const money = v => { const n=parseFloat(String(v).replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };

    if(!manage){
      if(!me) return `<h2>Subscriptions</h2><div class="card">${identifyHtml('The app hasn’t yet been told which member you are, so it can’t show your subscription.')}</div>`;
      const r = (store.subs||[]).find(x=>x.id===me.id+'|'+season);
      return `
        <h2>Subscriptions</h2>
        ${this.subsSeasonPicker(season)}
        <div class="card">
          <h4>Your subscription — ${esc(season)}</h4>
          ${r&&r.paid
            ? `<p style="color:var(--ok);font-size:16px;"><b>✓ Paid</b>${r.amount?' — £'+esc(r.amount):''}${r.paidOn?' on '+fmtDate(r.paidOn):''}</p>`
            : `<p><b>Not yet recorded as paid.</b>${rate?' The subscription for this season is £'+esc(rate)+'.':''}</p>
               <p class="small muted">If you have paid, let the Treasurer know — he records it here.</p>`}
        </div>
        <div class="card"><p class="small muted">The full subscriptions list is visible to the Secretary and Treasurer only.</p></div>`;
    }

    const ms = sortedMembers();
    const rows = ms.map(m=>({m, r:(store.subs||[]).find(x=>x.id===m.id+'|'+season)}));
    return `
      <h2>Subscriptions</h2>
      ${this.subsSeasonPicker(season)}
      <div class="card">
        <div id="subsstats">${this.subsStatsHtml(season)}</div>
        <div class="row" style="margin-top:14px;">
          <label class="small muted" for="sb_rate">Subscription for a season</label>
          <input id="sb_rate" value="${esc(rate)}" placeholder="e.g. 150" style="max-width:110px;" onchange="App.saveSubsRate(this.value)">
          <span class="muted small">Used to fill in each amount and work out what is still due.</span>
        </div>
      </div>
      <div class="card"><div class="tablewrap"><table>
        <tr><th>Member</th><th>Paid</th><th>Amount £</th><th>Date paid</th></tr>
        ${ms.length? rows.map(({m,r})=>`<tr>
          <td><b>${esc(m.name)}</b>${m.office?` <span class="muted small">· ${esc(m.office)}</span>`:''}</td>
          <td><input type="checkbox" style="width:19px;height:19px;accent-color:var(--navy);" ${r&&r.paid?'checked':''}
                onchange="App.subPaid('${m.id}','${season}',this.checked)" aria-label="Paid"></td>
          <td><input value="${esc(r?r.amount:'')}" placeholder="${esc(rate)}" style="max-width:90px;"
                onchange="App.subField('${m.id}','${season}','amount',this.value)"></td>
          <td><input type="date" value="${esc(r?r.paidOn:'')}" style="max-width:150px;"
                onchange="App.subField('${m.id}','${season}','paidOn',this.value)"></td>
        </tr>`).join('') : `<tr><td colspan="4" class="empty">Add members first and they'll appear here.</td></tr>`}
      </table></div></div>
      <p class="muted small">Ticking <b>Paid</b> fills in the amount and today's date for you — change either if it differs.</p>`;
  },
  subsStatsHtml(season){
    const money = v => { const n=parseFloat(String(v).replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; };
    const pounds = n => '£'+n.toFixed(2).replace(/\.00$/,'');
    const rate = (store.subsRate||{}).amount||'';
    const ms = sortedMembers();
    const rows = ms.map(m=>(store.subs||[]).find(x=>x.id===m.id+'|'+season));
    const paid = rows.filter(r=>r&&r.paid);
    const collected = paid.reduce((s,r)=>s+money(r.amount||rate), 0);
    const stillDue = (ms.length-paid.length) * money(rate);
    return `<div class="stats">
      <div class="stat"><b>${paid.length}</b><span>paid</span></div>
      <div class="stat"><b>${ms.length-paid.length}</b><span>outstanding</span></div>
      <div class="stat gold"><b>${pounds(collected)}</b><span>collected</span></div>
      ${money(rate)?`<div class="stat"><b>${pounds(stillDue)}</b><span>still due</span></div>`:''}
    </div>`;
  },
  refreshSubsStats(season){
    const el = $('#subsstats');
    if(el) el.innerHTML = this.subsStatsHtml(season);
  },
  subsSeasonPicker(season){
    return `<div class="row" style="margin-bottom:14px;">
      <label class="small muted" for="sbSeason">Season</label>
      <select id="sbSeason" style="max-width:140px;" onchange="App.subSeason=this.value;App.renderShell()">
        ${SEASONS.map(s=>`<option ${season===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>`;
  },
  subPaid(memberId, season, paid){
    if(!canManage()){ toast('Only the Secretary and Treasurer can record subscriptions.', true); return; }
    const r = this.subFor(memberId, season);
    r.paid = !!paid; r.updatedAt = now();
    if(paid){
      if(!r.amount) r.amount = (store.subsRate||{}).amount||'';
      if(!r.paidOn) r.paidOn = new Date().toISOString().slice(0,10);
    }
    save(); this.renderShell(); doSync(true);
  },
  subField(memberId, season, field, value){
    if(!canManage()){ toast('Only the Secretary and Treasurer can record subscriptions.', true); return; }
    const r = this.subFor(memberId, season);
    r[field] = value.trim ? value.trim() : value; r.updatedAt = now();
    save(); this.refreshSubsStats(season);   // totals update without disturbing the field being edited
    doSync(true); toast('Saved.');
  },
  saveSubsRate(v){
    if(!canManage()){ toast('Only the Secretary and Treasurer can change this.', true); return; }
    store.subsRate = {amount:v.trim(), updatedAt:now()};
    save(); this.renderShell(); doSync(true); toast('Saved.');
  },

  /* ================= SEARCH =================
     Looks through everything this member is allowed to see. */
  view_search(){
    return `
      <h2>Search</h2>
      <div class="card">
        <div class="field" style="margin-bottom:8px;">
          <label>Search the whole lodge app</label>
          <input id="sq" value="${esc(this.q||'')}" autocomplete="off"
            placeholder="A name, a lodge, a note, a task, a notice…" oninput="App.search(this.value)">
        </div>
        <div class="muted small">Members, meetings, visitors, events, notices, tasks and chat messages.</div>
      </div>
      <div id="searchresults">${this.searchResultsHtml()}</div>`;
  },
  search(v){
    this.q = v;
    const el = $('#searchresults');
    if(el) el.innerHTML = this.searchResultsHtml();
  },
  searchHits(){
    const q = (this.q||'').trim().toLowerCase();
    if(q.length < 2) return null;
    const out = [];
    const hit = (icon, title, sub, view, sub2) => out.push({icon, title, sub, view, sub2});
    const has = (...vals) => vals.some(v => v && String(v).toLowerCase().includes(q));

    sortedMembers().forEach(m=>{
      if(has(m.name, m.phone, m.email, m.rank, m.office))
        hit('👤', m.name, [m.office, m.rank, m.phone, m.email].filter(Boolean).join(' · '), 'members', null);
    });
    Object.values(store.meetings).forEach(m=>{
      const label = meetingTitle(m);
      if(has(m.type, m.notes, m.festive, m.place, m.date))
        hit('📖', label, [m.date?fmtDate(m.date):'', m.place, m.notes, m.festive].filter(Boolean).join(' · ').slice(0,150), 'meetings', m.id);
      (m.visitors||[]).filter(v=>!v.deleted).forEach(v=>{
        if(has(v.name, v.lodge, v.host))
          hit('🤝', v.name+(v.lodge?' — '+v.lodge:''), 'Visitor at '+label, 'meetings', m.id);
      });
      (m.files||[]).filter(f=>!f.deleted).forEach(f=>{
        if(has(f.name, f.by)) hit(fileIcon(f.name), f.name, 'Document on '+label, 'meetings', m.id);
      });
      (m.todos||[]).filter(t=>!t.deleted).forEach(t=>{
        if(has(t.task, t.name)) hit('✅', t.task, (t.name?t.name+' · ':'')+label+(t.done?' · done':''), 'meetings', m.id);
      });
    });
    store.events.filter(e=>!e.deleted).forEach(e=>{
      if(has(e.name, e.location, e.notes, e.time))
        hit('🎉', e.name, [e.date?fmtDate(e.date):'date TBC', e.location, e.notes].filter(Boolean).join(' · ').slice(0,150), 'events', e.id);
      (e.committee||[]).forEach(c=>{
        const m = c.memberId ? memberById(c.memberId) : null;
        if(has(m?m.name:c.name)) hit('🎉', (m?m.name:c.name), 'On the committee for “'+e.name+'”', 'events', e.id);
      });
      (e.todos||[]).filter(t=>!t.deleted).forEach(t=>{
        if(has(t.task, t.name)) hit('✅', t.task, (t.name?t.name+' · ':'')+'“'+e.name+'”'+(t.done?' · done':''), 'events', e.id);
      });
      if(onCommittee(e) || isOwner()) (e.chat||[]).forEach(c=>{
        if(has(c.text, c.who)) hit('💬', c.text, c.who+' · “'+e.name+'” chat', 'events', e.id);
      });
    });
    (store.todos||[]).filter(t=>!t.deleted).forEach(t=>{
      if(has(t.task, t.name)) hit('✅', t.task, (t.name?t.name+' · ':'')+'lodge to-do list'+(t.done?' · done':''), 'todo', null);
    });
    store.notices.filter(n=>!n.deleted).forEach(n=>{
      if(has(n.title, n.body, n.by, n.attachment&&n.attachment.name))
        hit('📌', n.title, 'Notice from '+n.by+(n.body?' · '+n.body.slice(0,110):''), 'notices', null);
    });
    (store.lodgeChat||[]).forEach(c=>{
      if(has(c.text, c.who)) hit('💬', c.text, c.who+' · Lodge Chat', 'chat', null);
    });
    return out;
  },
  searchResultsHtml(){
    const hits = this.searchHits();
    if(hits === null) return `<div class="card empty"><img src="./logo.jpg" alt=""><br>Type at least two letters to search.</div>`;
    this._hits = hits;
    if(!hits.length) return `<div class="card empty">Nothing found for “${esc(this.q)}”.</div>`;
    return `<div class="card" style="padding:6px 0;">
      ${hits.slice(0,80).map((h,i)=>`
        <div role="button" tabindex="0" onclick="App.searchGo(${i})" onkeydown="if(event.key==='Enter')App.searchGo(${i})"
             style="display:flex;gap:12px;align-items:flex-start;padding:11px 18px;border-bottom:1px solid var(--chip);cursor:pointer;">
          <span style="font-size:17px;" aria-hidden="true">${h.icon}</span>
          <span style="flex:1;min-width:0;">
            <b style="color:var(--navy-deep);">${esc(h.title)}</b>
            ${h.sub?`<span class="muted small" style="display:block;">${esc(h.sub)}</span>`:''}
          </span>
        </div>`).join('')}
      ${hits.length>80?`<div class="muted small" style="padding:10px 18px;">Showing the first 80 of ${hits.length} matches — try a more specific word.</div>`:''}
    </div>`;
  },
  searchGo(i){ const h=this._hits && this._hits[i]; if(h) this.go(h.view, h.sub2); },

  /* ================= NOTIFICATIONS ================= */
  view_notifications(){
    const all = buildNotifications();
    const seen = getSeen();
    this._notifs = all;

    markSeen(all.map(n=>n.id));
    return `

          <div role="button" tabindex="0" onclick="App.notifGo(${i})" onkeydown="if(event.key==='Enter')App.notifGo(${i})"

            <span style="font-size:18px;" aria-hidden="true">${n.icon}</span>
            <span style="flex:1;">${rich(n.text)}${newIds.has(n.id)?' <span class="chip gold" style="font-size:10px;">new</span>':''}</span>
            <span class="muted small" style="white-space:nowrap;">${n.at? new Date(n.at).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):''}</span>
          </div>`).join('')}
      </div>` : `<div class="card empty"><img src="./logo.jpg" alt=""><br>Nothing yet — when a brother tags you, gives you a task, or posts a notice, it appears here.</div>`}
      <p class="muted small">Notifications appear when the app syncs — automatically on opening and every few minutes while open.</p>`;
  },
  notifGo(i){ const n=this._notifs && this._notifs[i]; if(n) this.go(n.view, n.sub); },

  /* ---------- @mention suggestions (chat + task inputs) ---------- */
  mentionInput(ev){
    const el = ev.target, box = $('#mentionbox');
    const at = el.value.lastIndexOf('@');
    if(at === -1){ box.hidden = true; return; }
    const q = el.value.slice(at+1).toLowerCase();
    if(q.length > 24){ box.hidden = true; return; }
    const hits = sortedMembers().filter(m => m.name.toLowerCase().startsWith(q)).slice(0,6);
    if(!hits.length){ box.hidden = true; return; }
    this._mentionEl = el;
    box.innerHTML = hits.map(m=>`<button type="button" onmousedown="event.preventDefault();App.mentionPick('${jsq(m.name)}')">@${esc(m.name)}</button>`).join('');
    const r = el.getBoundingClientRect();
    box.style.left = Math.min(r.left, window.innerWidth-230)+'px';
    box.style.top = (r.bottom+4)+'px';
    box.hidden = false;
  },
  mentionPick(name){
    const el = this._mentionEl; if(!el) return;
    const at = el.value.lastIndexOf('@');
    el.value = el.value.slice(0, at) + '@' + name + ' ';
    $('#mentionbox').hidden = true;
    el.focus();
  },

  /* ================= NOTICES ================= */
  view_notices(){
    if(this.sub==='add') return `
      <h2>New notice</h2>
      <div class="card" style="max-width:560px;">
        <div class="field"><label>Title</label><input id="nt_title" placeholder="e.g. Provincial communication — dining fees"></div>
        <div class="field"><label>Notice</label><textarea id="nt_body" placeholder="The information members need…"></textarea></div>
        <div class="field"><label>Attach a document (optional, up to 3&nbsp;MB — PDF, Word, image)</label><input type="file" id="nt_file"></div>

        <div class="row">
          <button class="btn" onclick="App.noticeSave()">Post notice</button>
          <button class="btn ghost" onclick="App.go('notices')">Cancel</button>
        </div>
      </div>`;
    const ns = store.notices.filter(n=>!n.deleted).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || b.at-a.at);
    return `
      <h2>Lodge Notices</h2>
      <div class="row" style="margin-bottom:14px;">
        <button class="btn" onclick="App.go('notices','add')">+ New notice</button>
        <span class="muted small">Write a notice or attach a document — attachments open with one tap</span>
      </div>
      ${ns.length? ns.map(n=>`
        <div class="card ${n.pinned?'notice':''}">
          <h4>${n.pinned?'Pinned · ':''}${fmtDate(new Date(n.at).toISOString().slice(0,10))} · posted by ${esc(n.by)}</h4>
          <b>${esc(n.title)}</b>
          ${n.body?`<div class="small" style="margin-top:4px;white-space:pre-wrap;">${esc(n.body)}</div>`:''}
          ${n.attachment?`<div style="margin-top:8px;"><button class="btn ghost sm" onclick="App.noticeOpen('${n.id}')">📎 ${esc(n.attachment.name)}</button></div>`:''}
          <div class="row" style="margin-top:10px;">
            <button class="btn ghost sm" onclick="App.noticePin('${n.id}')">${n.pinned?'Unpin':'Pin'}</button>
            <button class="btn danger sm" onclick="App.noticeDel('${n.id}')">Delete</button>
          </div>
        </div>`).join('') : `<div class="card empty"><img src="./logo.jpg" alt=""><br>No notices yet.</div>`}`;
  },
  async noticeSave(){
    const title=$('#nt_title').value.trim();
    if(!title){ toast('Give the notice a title.', true); return; }
    const n={id:uid(), title, body:$('#nt_body').value, pinned:$('#nt_pin').checked, at:now(), by:session.name, updatedAt:now()};
    const f=$('#nt_file').files[0];
    if(f){
      if(f.size>3*1024*1024){ toast('That file is over 3 MB — please attach a smaller one.', true); return; }
      if(!session.token){ toast('Attachments need sync to be activated — posting the notice without it.', true); }
      else{
        try{
          const buf=new Uint8Array(await f.arrayBuffer()); let bin=''; buf.forEach(b=>bin+=String.fromCharCode(b));
          const path='attachments/'+n.id+'-'+f.name.replace(/[^\w.\-]+/g,'_');
          await ghPut(path, btoa(bin), 'Attachment: '+f.name);
          n.attachment={name:f.name, path};
        }catch(e){ toast('Could not upload the attachment: '+e.message, true); return; }
      }
    }
    store.notices.push(n); save(); this.go('notices'); toast('Notice posted.'); doSync(true);
  },
  async noticeOpen(id){
    const n=store.notices.find(x=>x.id===id); if(!n||!n.attachment) return;
    if(!session.token){ toast('Sync needs to be activated to open attachments.', true); return; }
    try{
      const f=await ghGet(n.attachment.path);
      const bin=atob(f.content.replace(/\n/g,'')); const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
      const blob=new Blob([bytes]); const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download=n.attachment.name; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    }catch(e){ toast('Could not open the attachment: '+e.message, true); }
  },
  noticePin(id){ const n=store.notices.find(x=>x.id===id); n.pinned=!n.pinned; n.updatedAt=now(); save(); this.renderShell(); },
  noticeDel(id){
    if(!confirm('Delete this notice?')) return;
    const n=store.notices.find(x=>x.id===id); n.deleted=true; n.updatedAt=now(); save(); this.renderShell();
  },
